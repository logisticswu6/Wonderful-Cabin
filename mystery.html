<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>神祕頁面 - 風格版</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
  </head>
  <body>
    <div class="container">
      <h1>神秘地方</h1>
      <p>To 晴文：<br />請選擇您的決策：</p>
      <button onclick="saveData('願意')" class="btn manual">願意</button>
      <button onclick="saveData('不願意')" class="btn mystery">不願意</button>

      <p id="status"></p>
      <a href="index.html" class="btn manual">返回首頁</a>
      <div id="noise-layer"></div>
    </div>

    <script>
      // 儲存設定的變數
      let config = {};

      // 頁面載入時先讀取設定
      async function loadConfig() {
        try {
          const response = await fetch("config.json");
          config = await response.json();
          console.log("設定檔載入成功");
        } catch (error) {
          console.error("無法載入 config.json，請檢查檔案路徑與格式", error);
        }
      }

      // 初始化
      loadConfig();

      async function saveData(choice) {
        if (!config.MASTER_KEY) {
          alert("設定檔尚未載入或格式錯誤！");
          return;
        }

        const status = document.getElementById("status");
        status.innerText = "正在儲存...";

        const dataToSend = {
          lastChoice: choice,
          timestamp: new Date().toLocaleString(),
        };

        try {
          const response = await fetch(
            `https://api.jsonbin.io/v3/b/${config.BIN_ID}`,
            {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                "X-Master-Key": config.MASTER_KEY, // 從讀取到的設定檔抓取
              },
              body: JSON.stringify(dataToSend),
            },
          );

          if (response.ok) {
            status.innerText = "儲存成功！選擇：" + choice;
          } else {
            status.innerText = "儲存失敗，請檢查 API Key。";
          }
        } catch (error) {
          status.innerText = "連線錯誤，請確認網路環境。";
        }
      }

      // 1. 阻擋滑鼠右鍵
      document.addEventListener("contextmenu", (event) =>
        event.preventDefault(),
      );

      // 2. 阻擋常見快捷鍵 (截圖/複製)
      document.addEventListener("keydown", (e) => {
        if (
          e.keyCode === 44 ||
          (e.ctrlKey && (e.key === "c" || e.key === "u" || e.key === "s"))
        ) {
          e.preventDefault();
          alert("此頁面禁止執行此操作！");
        }
      });
    </script>
  </body>
</html>
